trigger:
  branches:
    include:
    - develop
    - release/*
    - main
  tags:
    include:
    - v*.*.*
pool:
  name: Default
variables:
  IMAGE_NAME: medico-bloom
  IMAGE: $(REGISTRY_NAME).azurecr.io/medico-bloom
  TAG: $(Build.SourceVersion)
  REGISTRY_NAME: $(REGISTRY_NAME)
  AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
  AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
  AZURE_TENANT_ID: $(AZURE_TENANT_ID)
  AZURE_WEBAPP_NAME: $(AZURE_WEBAPP_NAME)
  AZURE_RG: $(AZURE_RG)
  ACR_NAME: $(ACR_NAME)
stages:
- stage: build
  displayName: Build
  jobs:
  - job: build
    displayName: Build & Test
    steps:
    - checkout: self
      displayName: Checkout
    - task: UseNode@1
      inputs:
        version: '20'
    - script: npm ci
      displayName: install (0)
    - script: npm run build --if-present
      displayName: build (0)
    - script: npm test --if-present -- --ci
      displayName: unit test
    - task: PublishTestResults@2
      inputs:
        testResultsFiles: '**/test-results.xml'
        failTaskOnFailedTests: true
      condition: succeededOrFailed()
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: dist
        ArtifactName: app
- stage: security
  displayName: Security
  jobs:
  - job: security_scans
    displayName: SAST + Dependency Scan + Lint
    steps:
    - checkout: self
      displayName: Checkout
    - task: UseNode@1
      inputs:
        version: '20'
    - script: npx --yes @snyk/cli test --severity-threshold=high || true
      displayName: SAST
    - script: npm audit --audit-level=high || true
      displayName: Dependency scan
    - script: npx --no-install eslint . --max-warnings=0 || true
      displayName: Lint
  dependsOn:
  - build
